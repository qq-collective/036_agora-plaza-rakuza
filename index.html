<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agora Platz Rakuza</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #f5f0eb;
    --bg2:       #efe9e2;
    --bg3:       #e8e0d8;
    --bg-head:   #e2d9cf;
    --border:    #d4c9bc;
    --border2:   #c2b5a5;
    --text:      #352c24;
    --text2:     #5a4e44;
    --text3:     #9a8878;
    --accent:    #7a5c3a;
    --accent2:   #9a7450;

    --nankin:  #2a6e50; --nankin-bg: #e8f2ee; --nankin-bd: #9ecfbc;
    --roast:   #a84e20; --roast-bg:  #f5ede6; --roast-bd:  #d4a080;
    --kara:    #7a6e64; --kara-bg:   #eeebe8; --kara-bd:   #bab0a8;
    --golden:  #8a6c18; --golden-bg: #f5f0de; --golden-bd: #d4bc70;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg2);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
  }

  header {
    background: var(--bg);
    border-bottom: 2px solid var(--border2);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: 0.07em;
  }
  header h1 span { color: var(--accent); }
  header p { font-size: 11px; color: var(--text3); margin-top: 2px; }

  .stats {
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 8px 28px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
  }
  .stat {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 14px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg2);
  }
  .stat-label { font-size: 11px; color: var(--text3); }
  .stat-count { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; }

  .layout { display: grid; grid-template-columns: 300px 1fr; height: calc(100vh - 102px); }

  .left {
    background: var(--bg);
    border-right: 2px solid var(--border2);
    display: flex;
    flex-direction: column;
  }
  .panel-ttl {
    background: var(--bg-head);
    border-bottom: 1px solid var(--border);
    padding: 9px 16px;
    font-size: 11px;
    font-weight: 700;
    color: var(--text3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  textarea {
    flex: 1;
    border: none;
    background: var(--bg);
    color: var(--text2);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    line-height: 1.8;
    padding: 14px 16px;
    resize: none;
    outline: none;
  }
  textarea::placeholder { color: var(--text3); }

  .preview {
    border-top: 1px solid var(--border);
    background: var(--bg2);
    padding: 12px 16px;
    min-height: 100px;
  }
  .preview h4 { font-size: 10px; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
  .preview-date { font-size: 12px; font-weight: 700; color: var(--accent); margin-bottom: 6px; }
  .preview-item { font-size: 11px; color: var(--text2); padding: 3px 0; border-bottom: 1px solid var(--border); display: flex; gap: 6px; }
  .preview-item .n { color: var(--text3); min-width: 16px; }

  .btn-add {
    margin: 10px 16px 12px;
    background: var(--accent);
    border: none;
    color: #fff;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 700;
    font-size: 13px;
    padding: 10px;
    border-radius: 5px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-add:hover { background: var(--accent2); }
  .btn-add:disabled { background: var(--border2); color: var(--text3); cursor: not-allowed; }

  .right { display: flex; flex-direction: column; overflow: hidden; }

  .filterbar {
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
  }
  .fbtn {
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text2);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.12s;
  }
  .fbtn:hover { border-color: var(--accent); color: var(--accent); }
  .fbtn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .search-input {
    margin-left: auto;
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 3px;
    outline: none;
    width: 180px;
  }
  .search-input:focus { border-color: var(--accent); }

  .table-wrap { flex: 1; overflow-y: auto; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    position: sticky; top: 0; z-index: 1;
    background: var(--bg-head);
    border-bottom: 2px solid var(--border2);
    padding: 9px 12px;
    text-align: left;
    font-size: 11px;
    font-weight: 700;
    color: var(--text2);
    white-space: nowrap;
  }
  tbody tr { border-bottom: 1px solid var(--border); }
  tbody tr:nth-child(even) { background: var(--bg2); }
  tbody tr:nth-child(odd)  { background: var(--bg);  }
  tbody tr:hover { background: var(--bg3); }
  tbody td { padding: 9px 12px; vertical-align: middle; font-size: 12px; }

  .td-no    { color: var(--text3); font-size: 11px; width: 30px; }
  .td-date  { color: var(--text2); font-size: 12px; font-weight: 500; white-space: nowrap; }
  .td-date input {
    background: var(--bg);
    border: 1px solid var(--accent);
    color: var(--text2);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 2px 6px;
    border-radius: 3px;
    width: 110px;
    outline: none;
  }
  .td-title { color: var(--text);  font-size: 12px; line-height: 1.5; }

  .genre-tag {
    font-size: 10px; padding: 2px 7px; border-radius: 3px;
    background: var(--bg3); color: var(--text2);
    border: 1px solid var(--border); white-space: nowrap; display: inline-block;
  }

  select.cs {
    background: var(--bg2); border: 1px solid var(--border);
    color: var(--text2); font-family: 'Noto Sans JP', sans-serif;
    font-size: 11px; padding: 3px 6px; border-radius: 3px; cursor: pointer; outline: none;
  }

  /* Teaching-Value: 全列同じフォント・サイズ・太さ、色のみ差分 */
  .tval { font-size: 12px; font-weight: 500; font-family: 'Noto Sans JP', sans-serif; white-space: nowrap; }
  .tval.s1 { color: var(--nankin); }
  .tval.s2 { color: var(--accent); }
  .tval.s3 { color: var(--golden); }
  .tval.s4 { color: var(--text3); }

  .btn-del {
    background: transparent; border: 1px solid var(--border);
    color: var(--text3); font-size: 12px;
    width: 24px; height: 24px; border-radius: 3px; cursor: pointer; transition: all 0.12s;
  }
  .btn-del:hover { border-color: #c07070; color: #c07070; }

  .new-badge {
    display: inline-block; background: var(--accent2); color: #fff;
    font-size: 9px; font-weight: 700; padding: 1px 5px;
    border-radius: 2px; margin-left: 6px; vertical-align: middle;
  }

  .empty { text-align: center; padding: 60px; color: var(--text3); }
  .empty h3 { font-size: 14px; color: var(--text2); margin-bottom: 6px; }

  .toast {
    position: fixed; bottom: 20px; right: 20px;
    background: var(--accent); color: #fff;
    font-size: 13px; padding: 10px 18px; border-radius: 5px;
    box-shadow: 0 3px 12px rgba(122,92,58,0.3);
    opacity: 0; transform: translateY(6px);
    transition: all 0.25s; pointer-events: none; z-index: 99;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  @media (max-width: 768px) {
    header { padding: 12px 16px; }
    header h1 { font-size: 15px; }
    .stats { padding: 8px 12px; gap: 5px; }
    .stat { padding: 4px 10px; }
    .stat-count { font-size: 14px; }
    .layout { grid-template-columns: 1fr; height: auto; }
    .left { border-right: none; border-bottom: 2px solid var(--border2); height: auto; }
    textarea { height: 140px; }
    .preview { min-height: auto; }
    .right { height: 60vh; min-height: 400px; }
    .filterbar { padding: 8px 10px; gap: 5px; flex-wrap: wrap; }
    .fbtn { font-size: 10px; padding: 4px 8px; }
    .search-input { width: 100%; margin-left: 0; margin-top: 4px; }
    thead th:nth-child(4), thead th:nth-child(6), tbody td:nth-child(4), tbody td:nth-child(6) { display: none; }
    tbody td { padding: 8px; font-size: 11px; }
    .td-title { font-size: 11px; }
  }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  .date-row {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 16px 0;
  }
  .date-row label { font-size: 11px; color: var(--text3); white-space: nowrap; font-weight: 700; }
  .date-picker {
    flex: 1;
    background: var(--bg2); border: 1px solid var(--border2);
    color: var(--text2); font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px; padding: 5px 10px; border-radius: 4px; outline: none;
  }
  .date-picker:focus { border-color: var(--accent); }

  /* ── Password screen ── */
  #pwScreen {
    position: fixed; inset: 0; z-index: 999;
    background: var(--bg2);
    display: flex; align-items: center; justify-content: center;
  }
  .pw-box {
    background: var(--bg);
    border: 2px solid var(--border2);
    border-radius: 10px;
    padding: 40px 36px;
    width: 320px;
    text-align: center;
    box-shadow: 0 6px 24px rgba(52,40,28,0.12);
  }
  .pw-box h2 {
    font-family: 'Syne', sans-serif;
    font-size: 20px; font-weight: 800;
    color: var(--text); margin-bottom: 6px;
  }
  .pw-box h2 span { color: var(--accent); }
  .pw-box p { font-size: 11px; color: var(--text3); margin-bottom: 24px; }
  .pw-input {
    width: 100%; padding: 11px 14px;
    background: var(--bg2); border: 1px solid var(--border2);
    border-radius: 5px; color: var(--text);
    font-family: 'Noto Sans JP', sans-serif; font-size: 14px;
    outline: none; text-align: center; letter-spacing: 0.15em;
    margin-bottom: 12px;
  }
  .pw-input:focus { border-color: var(--accent); }
  .pw-btn {
    width: 100%; padding: 11px;
    background: var(--accent); border: none; border-radius: 5px;
    color: #fff; font-family: 'Noto Sans JP', sans-serif;
    font-weight: 700; font-size: 14px; cursor: pointer;
    transition: background 0.15s;
  }
  .pw-btn:hover { background: var(--accent2); }
  .pw-err {
    margin-top: 10px; font-size: 12px;
    color: var(--roast); min-height: 18px;
  }

  /* ── Card view (mobile) ── */
  .card-list { padding: 10px; display: none; flex-direction: column; gap: 8px; }
  .card {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 12px 14px;
  }
  .card-top { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
  .card-title { flex: 1; font-size: 13px; color: var(--text); line-height: 1.5; font-weight: 500; }
  .card-meta { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .card-date { font-size: 11px; color: var(--text3); }
  .card-del {
    background: transparent; border: 1px solid var(--border);
    color: var(--text3); font-size: 12px;
    width: 24px; height: 24px; border-radius: 3px; cursor: pointer;
    flex-shrink: 0;
  }
  .card-del:hover { border-color: #c07070; color: #c07070; }
  select.cs-card {
    background: var(--bg2); border: 1px solid var(--border);
    color: var(--text2); font-family: 'Noto Sans JP', sans-serif;
    font-size: 11px; padding: 3px 6px; border-radius: 3px; cursor: pointer; outline: none;
  }

  @media (max-width: 768px) {
    .table-wrap table { display: none; }
    .card-list { display: flex; }
  }
</style>
</head>
<body>

<!-- Password Screen -->
<div id="pwScreen">
  <div class="pw-box">
    <h2>Agora <span>Platz</span> Rakuza</h2>
    <p>対話から生まれた知識の広場<br>メンバー専用エリアです</p>
    <input class="pw-input" id="pwInput" type="password" placeholder="パスワードを入力" autocomplete="off">
    <button class="pw-btn" onclick="checkPw()">入室する</button>
    <div class="pw-err" id="pwErr"></div>
  </div>
</div>

<header>
  <div>
    <h1>Agora <span>Platz</span> Rakuza</h1>
    <p>対話から生まれた知識の広場</p>
  </div>
</header>

<div class="stats" id="statsBar"></div>

<div class="layout">
  <div class="left">
    <div class="panel-ttl">📋 ナレッジ貼り付け → 追加</div>
    <div class="date-row">
      <label>📅 収録日</label>
      <input type="date" class="date-picker" id="datePicker">
    </div>
    <textarea id="inputArea" placeholder="「今回のハイライト」以降のテキストをそのままペースト&#10;&#10;例：&#10;今回のハイライト&#10;RPGゲーム風AIアプリ - メタバース的な教室空間の構想&#10;メタバースの歴史から学ぶ「来続ける理由」の設計&#10;&#10;※ 従来どおり番号付きリストでもOKです"></textarea>
    <div class="preview">
      <h4>🔍 解析プレビュー</h4>
      <div id="previewContent"><span style="color:var(--text3);font-size:11px;">テキストを貼ると自動解析します</span></div>
    </div>
    <button class="btn-add" id="btnAdd" disabled onclick="addEntries()">▶ テーブルに追加</button>
  </div>

  <div class="right">
    <div class="filterbar">
      <button class="fbtn active" onclick="setFilter('ALL',this)">すべて</button>
      <button class="fbtn" onclick="setFilter('🏛️ 定番',this)">🏛️ 定番</button>
      <button class="fbtn" onclick="setFilter('🔥 今が旬',this)">🔥 今が旬</button>
      <button class="fbtn" onclick="setFilter('📦 原石',this)">📦 原石</button>
      <button class="fbtn" onclick="setFilter('⭐ 授業向き',this)">⭐ 授業向き</button>
      <input class="search-input" id="searchInput" placeholder="🔍 タイトル検索..." oninput="renderTable()">
      <button class="fbtn" onclick="exportJSON()" title="JSONでエクスポート">💾 保存</button>
      <button class="fbtn" onclick="clearLS()" title="初期データに戻す" style="color:var(--text3)">↺</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th><th>収録日</th><th>タイトル</th><th>ジャンル</th>
            <th>Hidden Code</th><th>Teaching-Value</th><th></th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      <div class="empty" id="emptyState" style="display:none">
        <h3>データがありません</h3>
        <p>左パネルにナレッジテキストをペーストして追加してください</p>
      </div>
      <div class="card-list" id="cardList"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

let nextId=142, currentFilter='ALL';
let newIds=new Set();

function getPickerDate(){
  const v = document.getElementById('datePicker').value;
  return v || null; // YYYY-MM-DD or null
}

function parseInput(text){
  const lines = text.split('\n').map(l=>l.trim()).filter(Boolean);
  // テキスト内の日付（従来形式）
  let textDate = null;
  const titles = [];

  // 「今回のハイライト」モード検出
  const highlightIdx = lines.findIndex(l => /ハイライト|highlight/i.test(l));

  if(highlightIdx !== -1){
    // ハイライト以降の行をタイトルとして全取得（見出し行自体は除外）
    const bodyLines = lines.slice(highlightIdx + 1);
    for(const line of bodyLines){
      // 番号付きなら番号を除去、なければそのまま
      const numbered = line.match(/^\d+[\.．\)）]\s*(.+)/);
      const title = numbered ? numbered[1].trim() : line;
      if(title) titles.push(title);
    }
  } else {
    // 従来モード：番号付きリスト + テキスト内日付
    for(const line of lines){
      const dm = line.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);
      if(dm) textDate = `${dm[1]}-${dm[2].padStart(2,'0')}-${dm[3].padStart(2,'0')}`;
      const tm = line.match(/^\d+[\.．\)）]\s*(.+)/);
      if(tm) titles.push(tm[1].trim());
    }
  }

  // 日付優先順：ピッカー > テキスト内日付
  const date = getPickerDate() || textDate;
  return {date, titles, highlightMode: highlightIdx !== -1};
}

document.getElementById('inputArea').addEventListener('input', function(){
  const {date, titles, highlightMode} = parseInput(this.value);
  const box = document.getElementById('previewContent');
  const btn = document.getElementById('btnAdd');

  if(!titles.length && !this.value.trim()){
    box.innerHTML = '<span style="color:var(--text3);font-size:11px;">テキストを貼ると自動解析します</span>';
    btn.disabled = true; return;
  }

  const warnings = [];
  if(!date) warnings.push('⚠️ <b>収録日が未設定です</b>（上の日付欄で指定してください）');
  if(!titles.length) warnings.push('⚠️ <b>タイトルが見つかりません</b>（「今回のハイライト」以降をコピペ、または番号付きリスト形式で貼ってください）');

  let html = '';
  if(warnings.length){
    html += `<div style="background:#fdf0ec;border:1px solid var(--roast-bd);border-radius:4px;padding:8px 10px;margin-bottom:8px;font-size:11px;line-height:1.8;color:var(--roast);">${warnings.join('<br>')}</div>`;
  }
  if(date) html += `<div class="preview-date">📅 ${date}${highlightMode?' <span style="font-size:10px;color:var(--text3);">ハイライトモード</span>':''}</div>`;
  if(titles.length){
    html += titles.map((t,i)=>`<div class="preview-item"><span class="n">${i+1}.</span><span>${t.length>36?t.slice(0,36)+'…':t}</span></div>`).join('');
  }
  box.innerHTML = html;
  btn.disabled = !(date && titles.length);
});

function addEntries(){

  const added = titles.map(title=>{
    const {code,genre,tval} = classify(title);
    const rec = {id:nextId++, date, title, genre, code, tval};

function renderStats(){

function renderTable(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const filtered=records.filter(r=>{

    if(q&&!r.title.toLowerCase().includes(q)) return false;
    return true;
  }).sort((a,b)=>b.date.localeCompare(a.date));
  const tc=v=>v==='◎即戦力'?'s1':v==='○使えそう'?'s2':v==='△要加工'?'s3':'s4';
  document.getElementById('emptyState').style.display=filtered.length?'none':'block';
  renderCards(filtered);
  document.getElementById('tableBody').innerHTML=filtered.map(r=>`
    <tr>
      <td class="td-no">${r.id}</td>
      <td class="td-date" onclick="editDate(this,${r.id})" style="cursor:pointer" title="クリックで編集">${r.date}${newIds.has(r.id)?'<span class="new-badge">NEW</span>':''}</td>
      <td class="td-title">${r.title}</td>
      <td><span class="genre-tag">${r.genre}</span></td>
      <td><select class="cs" onchange="changeCode(${r.id},this.value)">
        <option value="🏛️ 定番" ${r.code==='🏛️ 定番'?'selected':''}>🏛️ 定番</option>
        <option value="🔥 今が旬"  ${r.code==='🔥 今が旬' ?'selected':''}>🔥 今が旬</option>
        <option value="📦 原石"   ${r.code==='📦 原石'  ?'selected':''}>📦 原石</option>
        <option value="⭐ 授業向き" ${r.code==='⭐ 授業向き'?'selected':''}>⭐ 授業向き</option>
      </select></td>
      <td><span class="tval ${tc(r.tval)}">${r.tval}</span></td>
      <td><button class="btn-del" onclick="deleteRecord(${r.id})">×</button></td>
    </tr>`).join('');
}

function editDate(cell, id) {
  if (cell.querySelector('input')) return;
  const r = records.find(r => r.id === id);
  if (!r) return;
  const original = r.date;
  cell.innerHTML = `<input type="text" value="${original}" placeholder="YYYY-MM-DD" maxlength="10">`;
  const input = cell.querySelector('input');
  input.focus(); input.select();
  function save() {
    const v = input.value.trim();
    if (/^\d{4}-\d{2}-\d{2}$/.test(v)) { r.date = v; showToast('📅 日付を更新しました'); saveToLS(); }
    else { r.date = original; }
    renderAll();
  }
  input.addEventListener('blur', save);
  input.addEventListener('keydown', e => { if(e.key==='Enter') input.blur(); if(e.key==='Escape'){r.date=original;renderAll();} });
  input.addEventListener('click', e => e.stopPropagation());
}
function changeCode(id,code){const r=records.find(r=>r.id===id);if(r){r.code=code;renderAll();}}
function renderAll(){renderStats();renderTable();}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}

// ── LocalStorage ─────────────────────────────
const LS_KEY = 'agora_platz_records';
const LS_ID  = 'agora_platz_nextId';

function saveToLS(){
  try{
    localStorage.setItem(LS_KEY, JSON.stringify(records));
    localStorage.setItem(LS_ID,  String(nextId));
  }catch(e){ console.warn('LS save failed', e); }
}

function loadFromLS(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    const nid = localStorage.getItem(LS_ID);
    if(raw){
      const saved = JSON.parse(raw);
      if(Array.isArray(saved) && saved.length > 0){
        records = saved;
        nextId  = nid ? parseInt(nid) : records.reduce((m,r)=>Math.max(m,r.id),0)+1;
        return true;
      }
    }
  }catch(e){ console.warn('LS load failed', e); }
  return false;
}

function exportJSON(){
  const blob = new Blob([JSON.stringify(records, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `agora_platz_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  showToast('💾 JSONエクスポート完了');
}

function clearLS(){
  if(!confirm('LocalStorageのデータを消去し、初期データ（141件）に戻しますか？')) return;
  localStorage.removeItem(LS_KEY);
  localStorage.removeItem(LS_ID);
  location.reload();
}
// ─────────────────────────────────────────────

// save after every mutation
const _origAdd    = addEntries;
addEntries = function(){ _origAdd(); saveToLS(); };

const _origChange = changeCode;
changeCode = function(id,code){ _origChange(id,code); saveToLS(); };

function deleteRecord(id){
  if(!confirm('削除しますか？')) return;
  records = records.filter(r=>r.id!==id);
  renderAll(); saveToLS();
};

// ── Init ─────────────────────────────────────
const loaded = loadFromLS();
renderAll();
if(loaded) showToast(`💾 保存データをロードしました（${records.length}件）`);
